<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeStage — コードスライドショー</title>
  <meta name="description" content="コード・実行結果・解説を1画面でスライド形式で学べるツール" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css" />
</head>
<body>
  <div id="app">
    <!-- Header Toolbar -->
    <header class="toolbar">
      <div class="toolbar-left">
        <h1 class="logo">
          <span class="logo-icon">▶</span>
          <span class="logo-text">CodeStage</span>
        </h1>
        <span class="slide-title" id="slideTitle"></span>
      </div>
      <div class="toolbar-center">
        <div class="pane-toggles">
          <button class="toggle-btn active" data-pane="code" title="コードペイン">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
            <span>コード</span>
          </button>
          <button class="toggle-btn active" data-pane="shell" title="シェルペイン">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
            <span>シェル</span>
          </button>
          <button class="toggle-btn active" data-pane="markdown" title="解説ペイン">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
            <span>解説</span>
          </button>
        </div>
      </div>
      <div class="toolbar-right">
        <!-- Layout Picker -->
        <div class="layout-picker" id="layoutPicker">
          <button class="layout-picker-btn" id="layoutPickerBtn" title="レイアウト変更">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect></svg>
          </button>
          <div class="layout-dropdown" id="layoutDropdown">
            <button class="layout-option active" data-layout="three-col" title="3列">
              <svg width="28" height="20" viewBox="0 0 28 20"><rect x="1" y="1" width="7" height="18" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="1" width="8" height="18" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="20" y="1" width="7" height="18" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
            <button class="layout-option" data-layout="left-stack" title="左2段+右">
              <svg width="28" height="20" viewBox="0 0 28 20"><rect x="1" y="1" width="12" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="11" width="12" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="15" y="1" width="12" height="18" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
            <button class="layout-option" data-layout="right-stack" title="左+右2段">
              <svg width="28" height="20" viewBox="0 0 28 20"><rect x="1" y="1" width="12" height="18" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="15" y="1" width="12" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="15" y="11" width="12" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
            <button class="layout-option" data-layout="top-bottom" title="上+下2列">
              <svg width="28" height="20" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="11" width="12" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="15" y="11" width="12" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
            <button class="layout-option" data-layout="bottom-top" title="上2列+下">
              <svg width="28" height="20" viewBox="0 0 28 20"><rect x="1" y="1" width="12" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="15" y="1" width="12" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="11" width="26" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
          </div>
        </div>
        <button class="theme-toggle" id="themeToggle" title="テーマ切替">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
        <div class="slide-nav">
          <button class="nav-btn" id="prevBtn" title="前のスライド">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
          </button>
          <span class="slide-counter" id="slideCounter">1 / 1</span>
          <button class="nav-btn" id="nextBtn" title="次のスライド">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Slide Progress Bar -->
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- Main Content Area (CSS Grid) -->
    <main class="content" id="content">
      <!-- Code Pane -->
      <section class="pane pane-code" id="paneCode" data-pane="code">
        <div class="pane-header" draggable="true" data-pane="code">
          <span class="pane-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
            コード
          </span>
          <div class="pane-actions">
            <span class="lang-badge" id="langBadge">python</span>
            <button class="action-btn" id="copyBtn" title="コピー">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </button>
          </div>
        </div>
        <div class="pane-body code-body" id="codeBody">
          <pre><code id="codeContent"></code></pre>
        </div>
      </section>

      <!-- Shell Pane -->
      <section class="pane pane-shell" id="paneShell" data-pane="shell">
        <div class="pane-header" draggable="true" data-pane="shell">
          <span class="pane-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
            シェル
          </span>
        </div>
        <div class="pane-body shell-body" id="shellBody"></div>
      </section>

      <!-- Markdown Pane -->
      <section class="pane pane-markdown" id="paneMarkdown" data-pane="markdown">
        <div class="pane-header" draggable="true" data-pane="markdown">
          <span class="pane-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
            解説
          </span>
        </div>
        <div class="pane-body markdown-body" id="markdownBody"></div>
      </section>
    </main>

    <!-- Slide Thumbnails Bar -->
    <footer class="slide-bar" id="slideBar"></footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
